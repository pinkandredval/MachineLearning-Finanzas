version: '3.8'

services:
  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: ML_VUELOS
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work/notebooks
      - ./data:/home/jovyan/work/data
    environment:
      - JUPYTER_TOKEN=ml2026
    command: start-notebook.sh --NotebookApp.token='ml2026'
